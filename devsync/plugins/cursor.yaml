# Cursor AI Plugin - YAML version showing it can be simple too!
name: cursor
version: 1.0.0
type: declarative
author: DevSync Core
description: Sync Cursor AI editor settings, extensions, and AI context
category: ai_tool
homepage: https://cursor.sh
platforms:
  - darwin
  - windows
  - linux

# Detection
detection:
  files:
    - darwin: "~/Library/Application Support/Cursor"
    - windows: "%APPDATA%/Cursor"
    - linux: "~/.config/Cursor"
  commands:
    - "cursor --version"

# Configuration paths
config_paths:
  settings:
    darwin: "~/Library/Application Support/Cursor/User/settings.json"
    windows: "%APPDATA%/Cursor/User/settings.json"
    linux: "~/.config/Cursor/User/settings.json"

  keybindings:
    darwin: "~/Library/Application Support/Cursor/User/keybindings.json"
    windows: "%APPDATA%/Cursor/User/keybindings.json"
    linux: "~/.config/Cursor/User/keybindings.json"

  snippets:
    darwin: "~/Library/Application Support/Cursor/User/snippets"
    windows: "%APPDATA%/Cursor/User/snippets"
    linux: "~/.config/Cursor/User/snippets"

  extensions:
    default: "~/.cursor/extensions"

  ai_context:
    darwin: "~/Library/Application Support/Cursor/User/globalStorage/cursor-ai"
    windows: "%APPDATA%/Cursor/User/globalStorage/cursor-ai"
    linux: "~/.config/Cursor/User/globalStorage/cursor-ai"

  workspace_storage:
    darwin: "~/Library/Application Support/Cursor/User/workspaceStorage"
    windows: "%APPDATA%/Cursor/User/workspaceStorage"
    linux: "~/.config/Cursor/User/workspaceStorage"

# Encryption for sensitive data
encryption:
  paths:
    - ai_context  # Contains API keys and conversation history
    - workspace_storage  # May contain project secrets

# Installation
installation:
  darwin:
    command: "brew install --cask cursor"
  windows:
    command: "winget install Cursor.Cursor"
  linux:
    command: "curl -fsSL https://cursor.sh/install.sh | sh"

# Post-restore actions
post_restore:
  - echo "Cursor AI configuration restored!"
  - echo "Installing extensions..."
  - |
    # Create extension install script
    if [ -f ~/.cursor/extensions/extensions.json ]; then
      cat ~/.cursor/extensions/extensions.json | jq -r '.[] | .identifier.id' | while read ext; do
        cursor --install-extension "$ext" 2>/dev/null || true
      done
    fi
  - echo "Please restart Cursor to apply all settings"

# Metadata
metadata:
  important_settings:
    - "cursor.aiModel"
    - "cursor.copilotEnabled"
    - "cursor.contextLength"
    - "cursor.temperature"
  extension_marketplace: "https://marketplace.visualstudio.com"
  supports_vscode_extensions: true